name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish the card bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # HACS downloads the file named in hacs.json ("not-a-plc-card.js") from the
      # release assets, so attach the built bundle to the release for this tag.
      # Uses the first-party `gh` CLI (preinstalled on the runner) rather than a
      # third-party action, so it is immune to the Actions Node-runtime churn that
      # broke the floating softprops/action-gh-release@v2.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          dist/not-a-plc-card.js
          --title "$GITHUB_REF_NAME"
          --generate-notes
