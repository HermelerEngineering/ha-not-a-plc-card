name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish the card bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # HACS downloads the file named in hacs.json ("not-a-plc-card.js") from the
      # release assets, so attach the built bundle to the release for this tag.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/not-a-plc-card.js
          generate_release_notes: true
